# Example GitHub Actions workflow for firmware repos that use HIL bench testing.
# Copy this to your firmware repo at .github/workflows/hil-test.yml and customize.

name: Build & HIL Test

on:
  push:
    branches: [main]
  pull_request:

# Only one HIL test per bench at a time.
# Use the bench_name from your config as the concurrency group to ensure
# multiple repos sharing a bench don't run simultaneously.
concurrency:
  group: hil-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build firmware
        run: |
          # Replace with your build command
          make build
          # Output: build/firmware.bin

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: build/firmware.bin
          retention-days: 1

  hil-test:
    needs: build
    # Use your bench_name as a label — install_runner.sh adds it automatically
    runs-on: [self-hosted, hil, my-bench-01]
    timeout-minutes: 10
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware

      - name: Bench health check
        run: benchctl health --check config --check probe

      - name: Flash firmware
        run: |
          benchctl flash \
            --firmware firmware.bin \
            --target samd51 \
            --verify

      - name: Wait for boot
        run: |
          benchctl serial expect \
            --target samd51 \
            --pattern "BOOT OK" \
            --timeout 15

      - name: Run self-test
        run: |
          benchctl serial send \
            --target samd51 \
            "RUN_SELF_TEST"
          benchctl serial expect \
            --target samd51 \
            --pattern "SELF_TEST PASS" \
            --timeout 30

      - name: Check fault pin
        run: |
          # Verify no fault condition
          benchctl gpio get --pin fault --target samd51
